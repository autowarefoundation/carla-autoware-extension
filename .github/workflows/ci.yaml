name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: ${{ hashFiles('tests/**') != '' }}
        run: pip install pytest pyyaml
      - if: ${{ hashFiles('tests/**') != '' }}
        run: pytest tests/ -v

  detect:
    runs-on: ubuntu-latest
    outputs:
      has_ext: ${{ steps.check.outputs.has_ext }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -n "$(git ls-files extension/)" ]; then
            echo "has_ext=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ext=false" >> "$GITHUB_OUTPUT"
          fi

  cpp-tests:
    needs: detect
    if: ${{ needs.detect.outputs.has_ext == 'true' }}
    runs-on: ubuntu-latest
    # Slim UE5 toolchain image (third-party OSS only; see docs/toolchain-image.md).
    # Moving tag by design until the first image build publishes an immutable
    # tag; a follow-up commit may pin the digest.
    container:
      image: ghcr.io/autowarefoundation/carla-ue5-toolchain:24.04
    steps:
      - uses: actions/checkout@v4
      - name: Fetch pinned CARLA CMake toolchain (upstream, sparse)
        run: |
          git init /tmp/carla
          git -C /tmp/carla remote add origin https://github.com/carla-simulator/carla.git
          git -C /tmp/carla sparse-checkout set CMake
          git -C /tmp/carla fetch --filter=blob:none --depth 1 origin 0a5ce0d5b4952bd8294a163c12d49f197bdb2aba
          git -C /tmp/carla checkout FETCH_HEAD
          test -f /tmp/carla/CMake/Toolchain.cmake
      - name: Install CycloneDDS (bridge — extension references no dds_* symbols)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cyclonedds-dev
      - name: Configure and build extension
        run: |
          export CARLA_ROOT=/tmp/carla
          cmake -S extension -B /tmp/build-ci -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/extension/toolchain/CarlaExtension.cmake"
          cmake --build /tmp/build-ci -j"$(nproc)"
      - name: Run extension unit tests
        run: |
          set +e
          out=$(/tmp/build-ci/test/extension_tests); status=$?
          set -e
          echo "$out" | tail -3
          [ "$status" -eq 0 ]
          echo "$out" | grep -q '\[  PASSED  \]'
          nm -D /tmp/build-ci/libcarla-autoware-extension.so | grep -q ' T carla_ros2_extension_init'
