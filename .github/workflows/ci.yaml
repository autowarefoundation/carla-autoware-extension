name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: ${{ hashFiles('tests/**') != '' }}
        run: pip install pytest pyyaml
      - if: ${{ hashFiles('tests/**') != '' }}
        run: pytest tests/ -v

  detect:
    runs-on: ubuntu-latest
    outputs:
      has_ext: ${{ steps.check.outputs.has_ext }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -n "$(git ls-files extension/)" ]; then
            echo "has_ext=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ext=false" >> "$GITHUB_OUTPUT"
          fi

  cpp-tests:
    needs: detect
    if: ${{ needs.detect.outputs.has_ext == 'true' }}
    runs-on: ubuntu-latest
    # Stock ROS 2 Jazzy: the extension builds with the system toolchain and the
    # apt-distributed Autoware message packages. The CARLA seam is a pure C ABI
    # (extension/include/carla/ros2/extension/CarlaRos2Extension.h), so no UE
    # toolchain is required; a libstdc++ .so coexists with the libc++ host.
    container:
      image: ros:jazzy
    steps:
      - uses: actions/checkout@v4
      - name: Install build and message dependencies
        run: |
          # cyclonedds-dev satisfies the `find_library(ddsc REQUIRED)` in the
          # Phase B stack extensions that have not yet dropped the CycloneDDS
          # link (#8-#11); the extension references no dds_ symbols, so the
          # package is inert for the ddsc-dropped tip (#13) and beyond.
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build libgtest-dev ca-certificates \
            cyclonedds-dev \
            ros-jazzy-autoware-control-msgs ros-jazzy-autoware-vehicle-msgs \
            ros-jazzy-geometry-msgs
      - name: Configure and build extension
        run: |
          # CARLA_ROOT is read only by the pre-migration extension CMake (a
          # hard env check); it becomes inert once phase-b/7-ros2-msgs lands
          # and can be dropped in a follow-up housekeeping PR.
          export CARLA_ROOT=/tmp/carla-stub
          mkdir -p "$CARLA_ROOT"
          source /opt/ros/jazzy/setup.bash
          cmake -S extension -B /tmp/build-ci -G Ninja
          cmake --build /tmp/build-ci -j"$(nproc)"
      - name: Run extension unit tests
        run: |
          set +e
          out=$(/tmp/build-ci/test/extension_tests); status=$?
          set -e
          echo "$out" | tail -3
          [ "$status" -eq 0 ]
          echo "$out" | grep -q '\[  PASSED  \]'
          nm -D /tmp/build-ci/libcarla-autoware-extension.so | grep -q ' T carla_ros2_extension_init'
