services:
  autoware:
    image: ghcr.io/autowarefoundation/autoware:universe-devel
    container_name: autoware
    network_mode: host
    ipc: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///work/docker/cyclonedds.xml
    volumes:
      - ./:/work/docker:ro
      - ../scripts:/work/scripts:ro
      - ../reports:/work/reports
      - ~/autoware_map/nishishinjuku:/autoware_map/nishishinjuku:ro
      - ../extension/build:/work/extension:ro
      # Host X11 socket so scripts/e2e/launch_rviz.sh can show RViz on the host
      # display (grant access once per session with `xhost +local:`).
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    command: sleep infinity
