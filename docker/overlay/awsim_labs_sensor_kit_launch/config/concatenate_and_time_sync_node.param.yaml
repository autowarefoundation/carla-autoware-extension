# Single-LiDAR concatenate overlay (Phase B M4-blocker #2, docs/phase-b-report.md).
#
# The stock awsim_labs_sensor_kit concatenate node waits on THREE pre-sync clouds
# (`[right, top, left]/pointcloud_before_sync`) before it publishes
# `concatenated/pointcloud`. The Phase B runner spawns a SINGLE top LiDAR
# (runner/spawn.py; side LiDARs are off-centreline and deliberately out of scope --
# runner/kit.py), so `left`/`right/pointcloud_before_sync` have publisher count 0, the
# concat node times out every cycle and stays SILENT, and NDT gets no input -- the
# binding half of the G1 localization failure (the other half, the `ray_cast__`
# frame_id, is fixed in runner/spawn.py).
#
# This overlay reduces the concat to the one LiDAR CARLA actually provides. A single
# 360-degree VLS-128 top cloud is a standard NDT localization input, so no side LiDARs
# and no off-centreline Y-flip handedness (runner/kit.py:37-42) are needed. The
# `matching_strategy` drops to `naive`: with one input there is no cross-LiDAR timestamp
# alignment to do, and `naive` needs no per-LiDAR offset/noise arrays (the pinned length
# of which must otherwise equal len(input_topics), a foot-gun avoided here).
#
# Applied by bind-mounting this file over the kit's shipped copy at
# /opt/autoware/share/awsim_labs_sensor_kit_launch/config/concatenate_and_time_sync_node.param.yaml
# (docker/compose.yaml). pointcloud_preprocessor.launch.py loads that path by default
# (arg concatenate_and_time_sync_node_param_path), so no launch-line change is needed.
# Every field except `input_topics` and `matching_strategy` is copied verbatim from the
# stock awsim_labs config so only the 1-vs-3 mismatch is changed, nothing else.
/**:
  ros__parameters:
    debug_mode: false
    rosbag_length: 10.0
    maximum_queue_size: 5
    timeout_sec: 0.2
    is_motion_compensated: false
    publish_synchronized_pointcloud: true
    keep_input_frame_in_synchronized_pointcloud: true
    publish_previous_but_late_pointcloud: false
    synchronized_pointcloud_postfix: pointcloud
    input_twist_topic_type: twist
    input_topics: [
                    "/sensing/lidar/top/pointcloud_before_sync",
                ]
    output_frame: base_link
    matching_strategy:
          type: naive
